<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathons — Kevin Weldon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @font-face {
            font-family: 'Departure Mono';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2409-1@1.0/DepartureMono-Regular.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Monument Grotesk Mono';
            src: url('https://fontshub.pro/f-files/5f074ee71423d4061dbf0727/files/MonumentGrotesk-Mono.woff2') format('woff2'),
                 url('https://fontshub.pro/f-files/5f074ee71423d4061dbf0727/files/MonumentGrotesk-Mono.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        :root {
            --color-dark-blue:   rgb(28, 60, 245);
            --color-medium-blue: rgb(61, 99, 241);
            --color-light-blue:  rgb(155, 171, 249);
            --color-cream:       rgb(251, 251, 251);
            --color-black:       rgb(0, 0, 0);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Monument Grotesk Mono', monospace;
            background-color: var(--color-cream);
            color: var(--color-black);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* ── Header ── */
        header { text-align: center; margin-bottom: 3rem; }

        .back-link {
            font-size: 0.85rem;
            color: var(--color-medium-blue);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
            transition: color 0.2s ease;
        }
        .back-link:hover { color: var(--color-dark-blue); }

        .page-title {
            font-family: 'Departure Mono', monospace;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 400;
            color: var(--color-dark-blue);
            margin-bottom: 1rem;
        }

        .page-intro {
            font-size: 0.95rem;
            color: var(--color-black);
            max-width: 500px;
            margin: 0 auto;
            opacity: 0.7;
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: var(--color-light-blue);
            margin: 2.5rem auto;
        }

        /* ── Tab grid ── */
        .tab-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
        }

        .tab-btn {
            background: none;
            border: 1px solid var(--color-light-blue);
            font-family: 'Monument Grotesk Mono', monospace;
            font-size: 0.8rem;
            color: var(--color-medium-blue);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.1rem;
            transition: all 0.15s ease;
            text-align: left;
        }
        .tab-btn:hover {
            border-color: var(--color-medium-blue);
            color: var(--color-dark-blue);
        }
        .tab-btn.active {
            border-color: var(--color-dark-blue);
            color: var(--color-dark-blue);
            background: rgba(28, 60, 245, 0.04);
        }
        .tab-year {
            font-size: 0.68rem;
            color: var(--color-light-blue);
            display: block;
        }
        .tab-btn.active .tab-year {
            color: var(--color-medium-blue);
        }

        /* ── Detail panel ── */
        .detail-panel { display: none; }
        .detail-panel.active { display: block; }

        /* ── Map + Elevation row ── */
        .viz-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            height: 280px;
        }

        .map-container {
            flex: 0 0 57%;
            border: 1px solid var(--color-light-blue);
            min-width: 0;
        }

        .elev-container {
            flex: 1 1 0;
            border: 1px solid var(--color-light-blue);
            min-width: 0;
            padding: 0.6rem 0.5rem 0.5rem 0.5rem;
            display: flex;
            flex-direction: column;
        }

        .elev-label {
            font-family: 'Departure Mono', monospace;
            font-size: 0.58rem;
            color: var(--color-light-blue);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            flex-shrink: 0;
        }

        .elev-svg-wrap {
            flex: 1;
            min-height: 0;
        }

        .elev-svg-wrap svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Marathon header ── */
        .marathon-number {
            font-family: 'Departure Mono', monospace;
            font-size: 0.75rem;
            color: var(--color-light-blue);
            margin-bottom: 0.3rem;
            letter-spacing: 0.05em;
        }
        .marathon-title {
            font-family: 'Departure Mono', monospace;
            font-size: clamp(1.3rem, 4vw, 1.7rem);
            font-weight: 400;
            color: var(--color-dark-blue);
            margin-bottom: 0.4rem;
        }
        .marathon-meta {
            font-size: 0.82rem;
            color: var(--color-medium-blue);
            margin-bottom: 1.5rem;
        }
        .meta-sep { margin: 0 0.4rem; color: var(--color-light-blue); }

        /* ── Stats ── */
        .marathon-stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .stat-label {
            font-size: 0.72rem;
            color: var(--color-medium-blue);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.15rem;
        }
        .stat-value {
            font-family: 'Departure Mono', monospace;
            font-size: 1.1rem;
            color: var(--color-black);
        }

        /* ── Description ── */
        .marathon-description {
            font-size: 0.92rem;
            opacity: 0.8;
            max-width: 560px;
            line-height: 1.75;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--color-light-blue);
            margin-top: 3rem;
        }
        footer p {
            font-size: 0.8rem;
            color: var(--color-medium-blue);
        }

        /* ── Mobile ── */
        @media (max-width: 520px) {
            .viz-row { flex-direction: column; height: auto; }
            .map-container { flex: none; height: 220px; }
            .elev-container { flex: none; height: 180px; }
        }
    </style>
</head>

    <div class="container">
        <header>

            </div>

            <div class="marathon-stats">

                    <div class="stat-value" id="panel-time"></div>
                </div>
                <div class="stat">
                    <div class="stat-label">Distance</div>

                </div>
                <div class="stat">

                    <div class="stat-value" id="panel-gain"></div>
                </div>
                <div class="stat">
                    <div class="stat-label">Location</div>
                    <div class="stat-value" id="panel-loc2"></div>
                </div>
            </div>

            <p class="marathon-description" id="panel-description"></p>
        </div>

        <footer>
            <p>© 2026 Kevin Weldon</p>
        </footer>
    </div>

    var leafletMap = null;
    var animTimer  = null;
    var currentIdx = null;

    function showMarathon(i) {
        var m = MARATHONS[i];

        document.querySelectorAll('.tab-btn').forEach(function(b) {
            b.classList.toggle('active', parseInt(b.dataset.index) === i);
        });

        document.getElementById('panel-number').textContent      = String(i + 1).padStart(2, '0');
        document.getElementById('panel-title').textContent       = m.title;
        document.getElementById('panel-date').textContent        = m.date;
        document.getElementById('panel-location').textContent    = m.location;
        document.getElementById('panel-time').textContent        = m.time;
        document.getElementById('panel-gain').textContent        = m.gain;
        document.getElementById('panel-loc2').textContent        = m.location.split(',')[0];
        document.getElementById('panel-description').textContent = m.description;

        var panel = document.getElementById('detail-panel');
        panel.classList.add('active');
        if (currentIdx !== null) {
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        currentIdx = i;

        renderMap(m.route);
        renderElev(m.elev);
    }

    /* ── Map ── */
    function renderMap(route) {
        var container = document.getElementById('panel-map');
        if (leafletMap) { leafletMap.remove(); leafletMap = null; }
        if (animTimer)  { clearTimeout(animTimer); animTimer = null; }
        container.innerHTML = '';
        if (!route || route.length < 2) return;

        var lats   = route.map(function(p) { return p[0]; });
        var lngs   = route.map(function(p) { return p[1]; });
        var bounds = [[Math.min.apply(null,lats), Math.min.apply(null,lngs)],
                      [Math.max.apply(null,lats), Math.max.apply(null,lngs)]];

        leafletMap = L.map(container, { zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafletMap);
        leafletMap.fitBounds(bounds, { padding: [16, 16] });
        L.polyline(route, { color: 'rgb(28,60,245)', weight: 3, opacity: 0.85 }).addTo(leafletMap);

        var dot = L.circleMarker(route[0], {
            radius: 5, fillColor: 'rgb(251,251,251)',
            color: 'rgb(28,60,245)', weight: 2, opacity: 1, fillOpacity: 1
        }).addTo(leafletMap);

        var idx = 0, total = route.length, interval = Math.round(8000 / total);
        function step() {
            idx = (idx + 1) % total;
            dot.setLatLng(route[idx]);
            animTimer = setTimeout(step, interval);
        }
        animTimer = setTimeout(step, interval);
    }

    /* ── Elevation chart ── */
    function renderElev(elev) {
        var wrap = document.getElementById('panel-elev');
        wrap.innerHTML = '';
        if (!elev || elev.length < 2) return;

        var toFt = function(m) { return m * 3.28084; };
        var elevFt = elev.map(toFt);
        var minE = Math.min.apply(null, elevFt);
        var maxE = Math.max.apply(null, elevFt);
        var range = maxE - minE || 1;

        // Pick a nice tick interval so we get ~3–5 ticks
        var candidates = [10, 25, 50, 100, 150, 200, 250, 500];
        var interval = candidates[0];
        for (var ci = 0; ci < candidates.length; ci++) {
            interval = candidates[ci];
            var numTicks = Math.floor((maxE - minE) / interval);
            if (numTicks >= 2 && numTicks <= 5) break;
        }

        var tickMin = Math.ceil(minE / interval) * interval;
        var tickMax = Math.floor(maxE / interval) * interval;
        var ticks = [];
        for (var t = tickMin; t <= tickMax; t += interval) ticks.push(t);

        // SVG dimensions & padding
        var VW = 300, VH = 220;
        var padL = 42, padT = 8, padR = 6, padB = 6;
        var cW = VW - padL - padR;
        var cH = VH - padT - padB;

        var n = elevFt.length;
        function xOf(i)  { return padL + (i / (n - 1)) * cW; }
        function yOf(e)  { return padT + (1 - (e - minE) / range) * cH; }

        // Area + line paths
        var ptStrings = elevFt.map(function(e, i) { return xOf(i) + ',' + yOf(e); });
        var areaD = 'M' + ptStrings.join('L')
                  + 'L' + xOf(n-1) + ',' + (padT + cH)
                  + 'L' + xOf(0)   + ',' + (padT + cH) + 'Z';
        var lineD = 'M' + ptStrings.join('L');

        // Y-axis ticks, grid lines, labels
        var gridLines = '';
        var yLabels   = '';
        ticks.forEach(function(t) {
            var y = yOf(t);
            gridLines += '<line x1="' + padL + '" y1="' + y + '" x2="' + (padL + cW) + '" y2="' + y
                       + '" stroke="rgb(155,171,249)" stroke-width="0.6" stroke-dasharray="3,3"/>';
            yLabels   += '<text x="' + (padL - 4) + '" y="' + y
                       + '" text-anchor="end" dominant-baseline="middle"'
                       + ' font-size="11" fill="rgb(61,99,241)">' + Math.round(t) + '</text>';
        });

        // Y-axis spine + baseline
        var ySpine   = '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (padT + cH)
                     + '" stroke="rgb(155,171,249)" stroke-width="0.8"/>';
        var baseline = '<line x1="' + padL + '" y1="' + (padT + cH) + '" x2="' + (padL + cW) + '" y2="' + (padT + cH)
                     + '" stroke="rgb(155,171,249)" stroke-width="0.8"/>';

        var svg = '<svg viewBox="0 0 ' + VW + ' ' + VH + '"'
                + ' preserveAspectRatio="xMidYMid meet"'
                + ' xmlns="http://www.w3.org/2000/svg"'
                + ' style="font-family: monospace;">'
                + ySpine + baseline + gridLines + yLabels
                + '<path d="' + areaD + '" fill="rgba(155,171,249,0.25)"/>'
                + '<path d="' + lineD + '" fill="none" stroke="rgb(28,60,245)"'
                + ' stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>'
                + '</svg>';

        wrap.innerHTML = svg;
    }
