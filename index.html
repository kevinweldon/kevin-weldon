<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Weldon</title>

    <!-- Fonts -->
    <style>
        @font-face {
            font-family: 'Departure Mono';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2409-1@1.0/DepartureMono-Regular.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Monument Grotesk Mono';
            src: url('https://fontshub.pro/f-files/5f074ee71423d4061dbf0727/files/MonumentGrotesk-Mono.woff2') format('woff2'),
                 url('https://fontshub.pro/f-files/5f074ee71423d4061dbf0727/files/MonumentGrotesk-Mono.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --color-dark-blue: rgb(28, 60, 245);
            --color-medium-blue: rgb(61, 99, 241);
            --color-light-blue: rgb(155, 171, 249);
            --color-cream: rgb(251, 251, 251);
            --color-black: rgb(0, 0, 0);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monument Grotesk Mono', monospace;
            background-color: var(--color-cream);
            color: var(--color-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .container {
            padding: 4rem 3rem;
            max-width: 800px;
        }

        .name {
            font-family: 'Departure Mono', monospace;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 400;
            color: var(--color-dark-blue);
            margin-bottom: 1.5rem;
        }

        .bio {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 550px;
        }

        .links {
            margin-top: 1.5rem;
        }

        .links a {
            color: var(--color-medium-blue);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: var(--color-dark-blue);
        }

        .social-links {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .social-links a {
            color: var(--color-medium-blue);
            display: inline-flex;
            transition: color 0.2s ease;
        }

        .social-links a:hover {
            color: var(--color-dark-blue);
        }

        .social-links svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">Kevin Weldon</h1>
        <p class="bio">
            I'm a mechanical engineer based in Pittsburgh, Pennsylvania. Welcome to my small corner of the internet. You can reach me at kmfweldon @ gmail.com.
        </p>
        <div class="links">
            <a href="work/">Experience →</a><br>
            <a href="film-photography/">Film Photography →</a><br>
            <a href="marathons/">Running →</a><br>
            <!-- <a href="interests/">Interests →</a> -->
        </div>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/kevin-weldon/" target="_blank" rel="noopener" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.27c-.97 0-1.75-.79-1.75-1.76s.78-1.76 1.75-1.76 1.75.79 1.75 1.76-.78 1.76-1.75 1.76zm13.5 12.27h-3v-5.6c0-1.34-.03-3.07-1.87-3.07-1.87 0-2.16 1.46-2.16 2.97v5.7h-3v-11h2.88v1.5h.04c.4-.76 1.39-1.56 2.86-1.56 3.06 0 3.63 2.02 3.63 4.64v6.42z"/></svg>
            </a>
            <a href="https://x.com/_kevinweldon" target="_blank" rel="noopener" aria-label="X">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.26 10.99h-6.466l-5.06-6.625-5.798 6.625H1.946l7.73-8.835L1.5 2.25h6.62l4.539 6.013 5.585-6.013zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z"/></svg>
            </a>
        </div>
    </div>
</body>
</html>
